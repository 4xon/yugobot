name: Build Linux (whatsapp-web)

on:
  workflow_dispatch:  # allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - run: |
          cargo build --release --features whatsapp-web --target x86_64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-linux-whatsapp-web
          path: target/x86_64-unknown-linux-gnu/release/zeroclaw
